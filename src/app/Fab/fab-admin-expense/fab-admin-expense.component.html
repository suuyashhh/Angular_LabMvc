<div class="page-container">
  <div class="page-header">
    <a routerLink="/fab/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
    <h2>General Workshop Expenses</h2>
  </div>

  <div class="content-grid">
    <!-- Form Card -->
    <div class="glass-card form-card">
      <div class="card-header">
        <h3>{{ isEditMode ? 'Modify Expense Log' : 'Record New Expense' }}</h3>
      </div>
      <form (ngSubmit)="onSubmit()" #expenseForm="ngForm" class="cyber-form">
        <div class="form-group">
          <label for="name">Expense Name / Reason</label>
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="expenseObj.exp_name"
            placeholder="e.g. Welding Rods, Electricity Bill"
            class="form-control"
            required
          />
        </div>

        <div class="form-group">
          <label for="price">Cost Price (₹)</label>
          <input
            type="number"
            id="price"
            name="price"
            [(ngModel)]="expenseObj.exp_price"
            placeholder="e.g. 1500"
            class="form-control"
            required
          />
        </div>

        <div class="form-group">
          <label for="date">Expense Date</label>
          <input
            type="date"
            id="date"
            name="date"
            [(ngModel)]="expenseObj.date"
            class="form-control"
            required
          />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit" [disabled]="!expenseForm.valid">
            {{ isEditMode ? 'Update Expense' : 'Log Expense' }}
          </button>
          <button type="button" class="btn-cancel" (click)="resetForm()">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Table Card -->
    <div class="glass-card table-card">
      <div class="card-header border-flex">
        <h3>Workshop Expenses Log</h3>
        
        <div class="search-filters">
          <div class="date-selector">
            <label for="from">From:</label>
            <input type="date" id="from" [(ngModel)]="searchFrom" class="form-control sm" />
          </div>
          <div class="date-selector">
            <label for="to">To:</label>
            <input type="date" id="to" [(ngModel)]="searchTo" class="form-control sm" />
          </div>
          <button (click)="fetchExpenses()" class="btn-submit sm-btn">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="premium-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Expense / Item Name</th>
              <th>Price</th>
              <th style="text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let exp of expenses">
              <td>{{ exp.date | date:'dd-MMM-yyyy' }}</td>
              <td><strong>{{ exp.exp_name }}</strong></td>
              <td class="price-cell">₹{{ exp.exp_price | number }}</td>
              <td class="action-cell">
                <button (click)="editExpense(exp)" class="btn-icon btn-edit" title="Edit Record">
                  <i class="fas fa-edit"></i>
                </button>
                <button (click)="deleteExpense(exp.exp_id)" class="btn-icon btn-delete" title="Delete Record">
                  <i class="fas fa-trash-alt"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="expenses.length === 0">
              <td colspan="4" class="no-data">No expense records found for this date range.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
