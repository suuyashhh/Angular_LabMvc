<div class="page-container">
  <!-- Page Header -->
  <div class="flex items-center gap-4 bg-white p-4 border-b border-slate-200 sticky top-0 z-40">
    <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-blue-50 flex items-center justify-center shadow-inner flex-shrink-0">
      <img src="assets/img/Fabrication/calendar_16118660.png" alt="Period Analysis Icon" class="w-6 h-6 sm:w-8 sm:h-8 object-contain" />
    </div>
    <div class="min-w-0">
      <h1 class="text-xl sm:text-2xl font-semibold text-slate-800 truncate">Custom Period Analysis</h1>
      <p class="text-xs sm:text-sm text-slate-500 -mt-0.5 truncate">Evaluate revenues and expenses for selected dates</p>
    </div>
  </div>

  <div class="p-4 sm:p-6 md:p-8 max-w-7xl mx-auto">
    <div class="control-bar glass-card">
      <div class="range-inputs">
        <div class="date-selector">
          <label for="from">Start Date:</label>
          <input type="date" id="from" [(ngModel)]="fromDate" (ngModelChange)="fetchSummary()" class="form-control" />
        </div>
        <div class="date-selector">
          <label for="to">End Date:</label>
          <input type="date" id="to" [(ngModel)]="toDate" (ngModelChange)="fetchSummary()" class="form-control" />
        </div>
      </div>
    </div>

    <!-- Cards View -->
    <div *ngIf="summary" class="metrics-grid mt-6">
      <div class="metric-card glass-card revenue">
        <div class="card-icon"><i class="fas fa-arrow-trend-up"></i></div>
        <div class="card-data">
          <p>Total Revenue (Billing)</p>
          <h3>₹{{ summary.totalBill | number:'1.2-2' }}</h3>
        </div>
      </div>

      <div class="metric-card glass-card expenses">
        <div class="card-icon"><i class="fas fa-arrow-trend-down"></i></div>
        <div class="card-data">
          <p>Total Expenses</p>
          <h3>₹{{ summary.totalExpense | number:'1.2-2' }}</h3>
        </div>
      </div>

      <div class="metric-card glass-card profit" [ngClass]="summary.profit >= 0 ? 'surplus' : 'deficit'">
        <div class="card-icon">
          <i [ngClass]="summary.profit >= 0 ? 'fas fa-hand-holding-dollar' : 'fas fa-triangle-exclamation'"></i>
        </div>
        <div class="card-data">
          <p>Net Balance</p>
          <h3>₹{{ summary.profit | number:'1.2-2' }}</h3>
        </div>
      </div>
    </div>
  </div>
</div>
