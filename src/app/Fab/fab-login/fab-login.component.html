<div class="login-wrapper">
  <div class="background-decor">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>

  <div class="login-card">
    <div class="card-header">
      <div class="logo-box">
        <i class="fas fa-tools text-3xl text-blue-500"></i>
      </div>
      <h2>Fabrication Portal</h2>
      <p>Log in to access your dashboard</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="type"><i class="fas fa-user-tag mr-2"></i>Portal Role</label>
        <select id="type" name="type" [(ngModel)]="loginObj.type" class="form-control" required>
          <option value="Admin">Administrator</option>
          <option value="Helper">Helper / Worker</option>
        </select>
      </div>

      <div class="form-group">
        <label for="username"><i class="fas fa-phone mr-2"></i>Contact / Username</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="loginObj.username"
          placeholder="Enter your contact number"
          class="form-control"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password"><i class="fas fa-lock mr-2"></i>Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="loginObj.password"
          placeholder="••••••••"
          class="form-control"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading || !loginForm.valid">
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading"><i class="fas fa-spinner fa-spin mr-2"></i>Signing in...</span>
      </button>
    </form>
  </div>
</div>
