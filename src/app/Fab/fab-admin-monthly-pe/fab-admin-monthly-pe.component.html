<div class="page-container">
  <!-- Page Header -->
  <div class="flex items-center gap-4 bg-white p-4 border-b border-slate-200 sticky top-0 z-40">
    <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-blue-50 flex items-center justify-center shadow-inner flex-shrink-0">
      <img src="assets/img/Fabrication/MonthSalery.png" alt="Monthly Summary Icon" class="w-6 h-6 sm:w-8 sm:h-8 object-contain" />
    </div>
    <div class="min-w-0">
      <h1 class="text-xl sm:text-2xl font-semibold text-slate-800 truncate">Monthly Profit Expense Management</h1>
    </div>
  </div>

  <!-- Page Content -->
  <div class="p-4 sm:p-6 max-w-7xl mx-auto space-y-4">
    <!-- Month Cards -->
    <div *ngFor="let r of records"
      class="bg-white border border-[#10b981] rounded-xl p-5 flex items-center justify-between shadow-sm hover:shadow-md transition-shadow">
      
      <!-- Month & Year (Left) -->
      <div class="text-lg sm:text-xl font-bold text-slate-700">
        {{ r.monthName }} {{ r.yearValue }}
      </div>

      <!-- Financial Metrics (Right) -->
      <div class="text-right space-y-1">
        <div class="text-sm sm:text-base font-semibold" [style.color]="r.profit >= 0 ? '#10b981' : '#ef4444'">
          Profit : ₹ {{ r.profit | number }}
        </div>
        <div class="text-sm sm:text-base font-semibold text-[#10b981]">
          Bill : ₹ {{ r.totalBill | number }}
        </div>
        <div class="text-sm sm:text-base font-semibold text-red-500">
          Expense : ₹ {{ r.totalExpense | number }}
        </div>
      </div>

    </div>

    <!-- No Data State -->
    <div *ngIf="records.length === 0" class="text-center py-12 bg-white rounded-xl border border-slate-100 shadow-sm">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-slate-50 flex items-center justify-center text-slate-400">
        <i class="fas fa-calendar-alt text-2xl"></i>
      </div>
      <h3 class="text-lg font-semibold text-slate-700 mb-1">No Records Found</h3>
      <p class="text-sm text-slate-500">No monthly financial records available.</p>
    </div>
  </div>
</div>
