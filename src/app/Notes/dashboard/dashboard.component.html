<!-- Navbar -->
<nav class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center space-x-6">
      <div class="flex items-center space-x-2">
        <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center shadow-md shadow-purple-500/10">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"></path>
          </svg>
        </div>
        <span class="text-slate-900 font-bold text-lg tracking-wide hidden sm:block">Notes</span>
      </div>

      <div class="flex space-x-2">
        <button (click)="setTab('home')"
          [class.bg-purple-50]="activeTab === 'home'"
          [class.text-purple-700]="activeTab === 'home'"
          [class.text-slate-600]="activeTab !== 'home'"
          class="px-3.5 py-1.5 rounded-lg font-semibold text-sm transition-all duration-150 hover:bg-slate-100">
          Home
        </button>
        <button (click)="setTab('paste')"
          [class.bg-purple-50]="activeTab === 'paste'"
          [class.text-purple-700]="activeTab === 'paste'"
          [class.text-slate-600]="activeTab !== 'paste'"
          class="px-3.5 py-1.5 rounded-lg font-semibold text-sm transition-all duration-150 hover:bg-slate-100">
          Paste
        </button>
      </div>
    </div>

    <div class="flex items-center space-x-4">
      <span class="text-sm text-slate-500 hidden md:block">Active: <strong class="text-slate-800">{{ currentUser?.name }}</strong></span>
      <button (click)="logout()"
        class="bg-white hover:bg-red-50 text-slate-750 hover:text-red-650 px-3.5 py-1.5 rounded-xl border border-slate-200 hover:border-red-200 transition-all duration-150 text-sm font-semibold flex items-center space-x-1.5 shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"></path>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </div>
</nav>

<div class="min-h-screen bg-slate-50/50 py-8 px-4 sm:px-6 lg:px-8 text-slate-850">
  <div class="max-w-7xl mx-auto">
    <!-- HOME TAB: Create Note -->
    <div *ngIf="activeTab === 'home'" class="space-y-6">
      <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-4">
        <div class="flex-1">
          <input type="text" [(ngModel)]="title" placeholder="Enter paste title..."
            class="w-full px-4 py-3 rounded-xl bg-white border border-slate-250 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-150 shadow-sm text-sm">
        </div>
        <button (click)="createOrUpdateNote()"
          class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-550 hover:to-indigo-550 px-6 py-3 rounded-xl font-semibold text-white shadow-md shadow-purple-500/10 hover:shadow-purple-500/20 transition-all duration-150 active:scale-98 flex items-center justify-center space-x-2 text-sm">
          <span>{{ editingNoteId ? 'Update My Paste' : 'Create My Paste' }}</span>
        </button>
      </div>

      <!-- Editor mockup -->
      <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
        <!-- Editor Header -->
        <div class="bg-slate-50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
          <div class="flex space-x-1.5">
            <span class="w-3 h-3 rounded-full bg-red-400 inline-block"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-400 inline-block"></span>
            <span class="w-3 h-3 rounded-full bg-green-400 inline-block"></span>
          </div>
          <button (click)="copyToClipboard(content)" title="Copy content"
            class="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg hover:bg-slate-100 transition-colors duration-150">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v9.75c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z"></path>
            </svg>
          </button>
        </div>
        <!-- Editor Textarea -->
        <textarea [(ngModel)]="content" placeholder="Write Your Content Here...." rows="16"
          class="w-full bg-white border-none text-slate-800 placeholder-slate-400 px-5 py-4 font-mono text-sm focus:ring-0 focus:outline-none resize-none leading-relaxed"></textarea>
      </div>
    </div>

    <!-- PASTE TAB: List & Search Notes -->
    <div *ngIf="activeTab === 'paste'" class="space-y-6">
      <!-- Search Input -->
      <div>
        <div class="relative rounded-xl shadow-sm">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <input type="text" [(ngModel)]="searchQuery" (input)="onSearchChange()" placeholder="Search paste here..."
            class="block w-full pl-10 pr-4 py-3 bg-white border border-slate-200 text-slate-900 placeholder-slate-400 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-150 shadow-sm text-sm">
        </div>
      </div>

      <!-- Pastes Header -->
      <div class="flex justify-between items-center border-b border-slate-200 pb-3">
        <h3 class="text-2xl font-bold tracking-tight text-slate-900">All Pastes</h3>
        <span class="text-sm font-semibold text-purple-750 bg-purple-50 px-3 py-1 rounded-full border border-purple-100">
          {{ notes.length }} items
        </span>
      </div>

      <!-- Pastes List -->
      <div class="space-y-4" *ngIf="notes.length > 0">
        <div *ngFor="let note of notes"
          class="bg-white border border-slate-200 rounded-2xl p-5 hover:shadow-md hover:border-purple-200 transition-all duration-150 flex flex-col md:flex-row justify-between items-start gap-4">
          
          <div class="flex-1 space-y-2">
            <h4 class="text-xl font-bold text-slate-900 cursor-pointer hover:text-purple-650 transition-colors duration-150"
              (click)="viewNote(note)">
              {{ note.title }}
            </h4>
            <p class="text-sm text-slate-650 font-mono line-clamp-3 leading-relaxed whitespace-pre-wrap">
              {{ note.content }}
            </p>
          </div>

          <div class="flex md:flex-col justify-between items-end gap-3.5 w-full md:w-auto shrink-0">
            <!-- Action Icons -->
            <div class="flex space-x-2">
              <button (click)="editNote(note)" title="Edit Paste"
                class="p-2 bg-white hover:bg-purple-50 text-slate-500 hover:text-purple-650 rounded-lg border border-slate-200 hover:border-purple-200 shadow-sm transition-all duration-150">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125"></path>
                </svg>
              </button>
              <button (click)="deleteNote(note.id)" title="Delete Paste"
                class="p-2 bg-white hover:bg-red-50 text-slate-500 hover:text-red-650 rounded-lg border border-slate-200 hover:border-red-200 shadow-sm transition-all duration-150">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"></path>
                </svg>
              </button>
              <button (click)="viewNote(note)" title="View Paste"
                class="p-2 bg-white hover:bg-blue-50 text-slate-500 hover:text-blue-650 rounded-lg border border-slate-200 hover:border-blue-200 shadow-sm transition-all duration-150">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
              </button>
              <button (click)="copyToClipboard(note.content)" title="Copy Paste"
                class="p-2 bg-white hover:bg-green-50 text-slate-500 hover:text-green-650 rounded-lg border border-slate-200 hover:border-green-200 shadow-sm transition-all duration-150">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v9.75c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z"></path>
                </svg>
              </button>
            </div>
            <!-- Date -->
            <div class="text-xs text-slate-400 font-semibold flex items-center space-x-1">
              <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"></path>
              </svg>
              <span>{{ formatDate(note.createdDate) }}</span>
            </div>
          </div>

        </div>
      </div>

      <!-- No Pastes Found -->
      <div *ngIf="notes.length === 0" class="text-center py-16 bg-white border border-slate-200 rounded-2xl shadow-sm">
        <svg class="w-12 h-12 text-slate-350 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"></path>
        </svg>
        <p class="text-slate-500 text-lg font-semibold">No pastes found matching your search.</p>
        <button (click)="setTab('home')" class="mt-4 text-purple-600 hover:text-purple-755 font-bold text-sm transition-colors duration-150">
          Create one now &rarr;
        </button>
      </div>
    </div>
  </div>
</div>

<!-- VIEW MODAL OVERLAY -->
<div *ngIf="selectedNote" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white border border-slate-200 rounded-2xl w-full max-w-3xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
      <h3 class="text-xl font-bold text-slate-900 truncate pr-4">{{ selectedNote.title }}</h3>
      <button (click)="closeView()" class="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg hover:bg-slate-200 transition-colors duration-150">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    
    <div class="p-6 overflow-y-auto font-mono text-sm text-slate-800 bg-white whitespace-pre-wrap leading-relaxed flex-1 select-text">
      {{ selectedNote.content }}
    </div>

    <div class="bg-slate-50 px-6 py-4 border-t border-slate-200 flex justify-between items-center">
      <span class="text-xs text-slate-500 font-semibold">{{ formatDate(selectedNote.createdDate) }}</span>
      <div class="flex space-x-2">
        <button (click)="copyToClipboard(selectedNote.content)"
          class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-550 hover:to-indigo-550 text-white px-4 py-2 rounded-xl font-semibold shadow-md shadow-purple-500/10 hover:shadow-purple-500/20 transition-all duration-150 text-sm flex items-center space-x-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v9.75c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z"></path>
          </svg>
          <span>Copy</span>
        </button>
        <button (click)="closeView()"
          class="bg-white hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-xl font-semibold border border-slate-200 transition-colors duration-150 text-sm shadow-sm">
          Close
        </button>
      </div>
    </div>
  </div>
</div>
