<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-badge">
      <span class="material-icons-outlined">storefront</span>
      <span>Partner Registration</span>
    </div>

    <header class="auth-header">
      <h1>Create Provider Account</h1>
    </header>

    <div class="error-banner" *ngIf="errorMessage">
      <span class="material-icons-outlined">error_outline</span>
      <span>{{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="onRegister()" #regForm="ngForm" class="auth-form">
      <div class="field-grid">
        <div class="field-block">
          <label for="name">Full Name</label>
          <div class="field-control">
            <span class="material-icons-outlined field-icon">person</span>
            <input id="name" type="text" name="name" [(ngModel)]="regData.NAME" required placeholder="Enter full name" />
          </div>
        </div>

        <div class="field-block">
          <label for="phone">Phone Number</label>
          <div class="field-control">
            <span class="material-icons-outlined field-icon">phone</span>
            <input id="phone" type="tel" name="phone" [(ngModel)]="regData.PHONE" required placeholder="Enter phone number" />
          </div>
        </div>
      </div>

      <div class="field-block">
        <label for="email">Email Address</label>
        <div class="field-control">
          <span class="material-icons-outlined field-icon">mail</span>
          <input id="email" type="email" name="email" [(ngModel)]="regData.EMAIL" required placeholder="Enter email address" />
        </div>
      </div>

      <div class="field-grid">
        <div class="field-block">
          <label for="password">Password</label>
          <div class="field-control">
            <span class="material-icons-outlined field-icon">lock</span>
            <input
              id="password"
              [type]="hidePassword ? 'password' : 'text'"
              name="password"
              [(ngModel)]="regData.PASS"
              required
              placeholder="Create a password"
            />
            <button class="toggle-visibility" type="button" (click)="togglePasswordVisibility()" aria-label="Toggle password visibility">
              <span class="material-icons-outlined">{{ hidePassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <div class="field-block">
          <label for="confirmPass">Confirm Password</label>
          <div class="field-control">
            <span class="material-icons-outlined field-icon">verified_user</span>
            <input
              id="confirmPass"
              [type]="hidePassword ? 'password' : 'text'"
              name="confirmPass"
              [(ngModel)]="regData.confirmPass"
              required
              placeholder="Re-enter password"
            />
          </div>
        </div>
      </div>

      <label class="terms-choice">
        <input type="checkbox" name="terms" required />
        <span>I agree to the <a href="javascript:void(0)">Terms of Service</a> and <a href="javascript:void(0)">Privacy Policy</a>.</span>
      </label>

      <button type="submit" class="submit-button" [disabled]="!regForm.form.valid || isLoading">
        <span *ngIf="isLoading" class="loader"></span>
        <span>{{ isLoading ? 'Creating Account...' : 'Create Account' }}</span>
      </button>
    </form>

    <footer class="auth-footer">
      <p>Already have an account?</p>
      <a routerLink="/parking/provider-login">Sign in here</a>
    </footer>
  </div>

  <p class="auth-legal">&copy; {{ currentYear }} Smart Parking. Built for modern parking providers.</p>
</section>
