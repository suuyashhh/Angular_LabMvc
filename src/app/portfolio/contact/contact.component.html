<main class="relative z-10 w-full mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-8 md:pt-32 md:pb-16 max-w-5xl min-h-screen flex flex-col items-center">

  <!-- Header Section -->
  <div class="text-center space-y-3 mb-8 w-full scroll-reveal reveal-fade-up">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-zinc-900 font-sans">
      Contact
    </h1>
    <p class="text-sm md:text-[1.05rem] text-zinc-500 font-medium max-w-lg mx-auto">
      Have a question or want to discuss a project? Drop a message below.
    </p>
  </div>

  <!-- Contact Form Card -->
  <div class="w-full max-w-md bg-white border border-dashed border-zinc-200 rounded-3xl p-6 sm:p-8 shadow-sm scroll-reveal reveal-scale-up delay-100">
    <form class="space-y-5">
      
      <!-- Name Field -->
      <div class="space-y-1.5">
        <label for="name" class="block text-xs sm:text-sm font-bold text-zinc-700">Name</label>
        <input type="text" id="name" name="name"
               class="w-full px-4 py-3 bg-zinc-50 border border-dashed border-zinc-200 rounded-2xl text-zinc-800 placeholder-zinc-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-zinc-950/10 focus:border-zinc-950 transition-all text-sm font-medium"
               placeholder="Your name">
      </div>

      <!-- Email Field -->
      <div class="space-y-1.5">
        <label for="email" class="block text-xs sm:text-sm font-bold text-zinc-700">Email Address</label>
        <input type="email" id="email" name="email"
               class="w-full px-4 py-3 bg-zinc-50 border border-dashed border-zinc-200 rounded-2xl text-zinc-800 placeholder-zinc-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-zinc-950/10 focus:border-zinc-950 transition-all text-sm font-medium"
               placeholder="name@example.com">
      </div>

      <!-- Message Field -->
      <div class="space-y-1.5">
        <label for="message" class="block text-xs sm:text-sm font-bold text-zinc-700">Message</label>
        <textarea id="message" name="message" rows="4"
                  class="w-full px-4 py-3 bg-zinc-50 border border-dashed border-zinc-200 rounded-2xl text-zinc-800 placeholder-zinc-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-zinc-950/10 focus:border-zinc-950 transition-all text-sm font-medium resize-none"
                  placeholder="How can I help you?"></textarea>
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full bg-zinc-950 hover:bg-zinc-900 text-white font-bold py-3.5 px-4 rounded-2xl transition-all shadow-md active:scale-[0.98] cursor-pointer text-sm">
        Send Message
      </button>
    </form>
  </div>

  <!-- Clean Minimal Footer -->
  <footer class="w-full mt-12 border-t border-dashed border-zinc-200 pt-6 text-center scroll-reveal reveal-fade-up">
    <p class="text-xs text-zinc-400 font-semibold select-none">© 2026 Suyash Patil. All rights reserved.</p>
  </footer>

</main>
